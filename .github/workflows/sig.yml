name: sig

on: [push, pull_request]

jobs:
  sig:
    runs-on: ubuntu-latest
    env:
      BUNDLE_WITH: sig
    steps:
    - uses: actions/checkout@v6
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ruby
        bundler-cache: true
    - name: Run RBS test
      run: bundle exec rake rbs:test
